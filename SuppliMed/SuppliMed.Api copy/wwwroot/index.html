<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuppliMed Login</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/inventory.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h1 class="logo">Suppli<span>Med</span></h1>
            <h2>WELCOME BACK!</h2>
            
            <div class="input-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your username">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password">
                    <button type="button" id="togglePassword" class="eye-btn">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="24" height="24">
                            <path d="M12 4.5C7.3 4.5 3.3 8.3 2 12c1.3 3.7 5.3 7.5 10 7.5s8.7-3.8 10-7.5c-1.3-3.7-5.3-7.5-10-7.5zM12 17c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember Me</span>
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button id="btnLogin" class="btn-login" onclick="handleLogin()">Login</button>
            
            <p id="message"></p>

            <p class="footer-note">Can't log-in? Kindly ask your system administrator</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
