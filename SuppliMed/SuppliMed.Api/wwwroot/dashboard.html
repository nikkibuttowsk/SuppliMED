<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuppliMed Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="user-profile">
                <img src="/avatar.png" alt="Admin">
            </div>
            <div class="nav-icons">
                <button class="nav-item active">🏠</button>
                <button class="nav-item">📦</button>
                <button class="nav-item">📊</button>
            </div>
            <div class="bottom-icons">
                <button class="nav-item">🚪</button>
                <button class="nav-item">⚙️</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="dashboard-header">
                <h1 class="logo">Suppli<span>Med</span></h1>
                <div class="header-info">
                    <p>● Hello</p>
                    <p id="current-date">19 April 2026 12:43:02</p>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-card total">
                    <div class="icon">🛍️</div>
                    <div class="data"><h3>4</h3><p>Total Supply</p></div>
                </div>
                <div class="stat-card low">
                    <div class="icon">📊</div>
                    <div class="data"><h3>2</h3><p>Low Stock</p></div>
                </div>
                <div class="stat-card expired">
                    <div class="icon">⌛</div>
                    <div class="data"><h3>0</h3><p>Expired Supply</p></div>
                </div>
            </div>

            <div class="details-grid">
                <section class="details-panel">
                    <h3>Low Stock Supplies <span class="badge yellow">2</span></h3>
                    <div class="item-card">
                        <div class="item-info">
                            <strong>Nebulizer</strong>
                            <p>I-care</p>
                        </div>
                        <div class="item-qty">
                            <span>10</span>
                            <div class="progress-bar"><div class="progress red" style="width: 10%"></div></div>
                        </div>
                    </div>
                </section>

                <section class="details-panel">
                    <h3>Expiring Soon <span class="badge green">1</span></h3>
                    </section>

                <div class="action-column">
                    <button class="action-btn add"><span>+</span> Add Supply</button>
                    <button class="action-btn delete"><span>🗑️</span> Delete Supply</button>
                    <button class="action-btn update"><span>📝</span> Update Supply</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/dashboard.js"></script>
</body>
</html>
