<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuppliMed Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>   
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="user-profile">
                <img src="/avatar.png" alt="Admin">
            </div>
            <div class="nav-icons">
                <button class="nav-item active">🏠</button>
                <button class="nav-item">📦</button>
                <button class="nav-item">📊</button>
            </div>
            <div class="bottom-icons">
                <button class="nav-item">🚪</button>
                <button class="nav-item">⚙️</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="dashboard-header">
                <h1 class="logo">Suppli<span>Med</span></h1>
                <div class="header-info">
                    <p>● Hello</p>
                    <p id="current-date">19 April 2026 12:43:02</p>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-card">
                    <h3>Total Supplies</h3>
                    <p id="total-supply-count">...</p> </div>

                <div class="stat-card low-stock">
                    <h3>Low Stock</h3>
                    <p id="low-stock-count">0</p>
                </div>

                <div class="stat-card expiring">
                    <h3>Expired Supply</h3>
                    <p id="expired-count">0</p>
                </div>
            </div>

            <div class="details-grid">
                <section class="details-panel">
                    <h3>Low Stock Supplies <span id="low-stock-badge" class="badge yellow">0</span></h3>
                    <div id="low-stock-list"></div>
                </section>

                <section class="details-panel">
                    <h3>Expiring Soon <span id="expiring-badge" class="badge green">0</span></h3>
                    <div id="expiring-list"></div>
                </section>

                <div class="action-column">
                    <button class="action-btn add"><span>+</span> Add Supply</button>
                    <button class="action-btn delete"><span>🗑️</span> Delete Supply</button>
                    <button class="action-btn update"><span>📝</span> Update Supply</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/dashboard.js"></script>
</body>
</html>
